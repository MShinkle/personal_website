---
layout: default
---
<header class="project-header">
  <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back</a>
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %Y" }}</time>
  {% if page.tags %}
  <div class="tags">
    <span class="tag-label">Tags:</span> {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {% endif %}
  {% if page.links %}
  <div class="project-links">
    {% for link in page.links %}
    <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.name }}</a>
    {% endfor %}
  </div>
  {% endif %}
</header>

<article class="project-content">
  {{ content }}
</article>
